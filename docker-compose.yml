version: "3.9"

services:
  frauddb:
    image: postgres:16
    container_name: frauddb
    environment:
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=app
      - POSTGRES_DB=frauddb
    ports:
      - "5440:5432"
    volumes:
      - ./sql:/sql

  zookeeper:
    image: wurstmeister/zookeeper
    container_name: zookeeper
    ports:
      - "2181:2181"

  kafka:
    image: wurstmeister/kafka:2.13-2.8.1
    platform: linux/amd64
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    depends_on:
      - zookeeper


  spark:
    image: apache/spark:3.5.1
    platform: linux/amd64
    container_name: spark
    environment:
      - SPARK_MODE=driver
    volumes:
      - ./ml:/app/ml
      - ./models:/app/models
    depends_on:
      - kafka


  api:
    build: ./api
    depends_on:
      - frauddb
    environment:
      - DATABASE_URL=postgresql://app:app@frauddb:5432/frauddb
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    ports:
      - "8000:8000"

  trainer:
    build: .
    volumes:
      - ./ml:/app/ml
      - ./models:/app/models
      - ./data:/app/data
    command: python /app/ml/train_model.py
